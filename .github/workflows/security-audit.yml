name: Security Audit Gate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix astro-app ci

      - name: Start stack
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for web health
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:4321/api/analysis/health >/dev/null; then
              echo "Web is healthy"
              exit 0
            fi
            echo "Waiting for web... ($i/90)"
            sleep 3
          done
          echo "Web health check timed out"
          exit 1

      - name: Run smoke baseline
        env:
          SECURITY_SMOKE_BASE_URL: http://localhost:4321
        run: npm run security:smoke

      - name: Run full audit
        env:
          SECURITY_AUDIT_BASE_URL: http://localhost:4321
          SECURITY_AUDIT_ORIGIN: http://localhost:4321
        run: npm run security:audit

      - name: Enforce policy rules
        run: npm run security:policy

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-full-audit-results
          path: security-full-audit-results.json
          if-no-files-found: warn

      - name: Web logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color web

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml down -v
